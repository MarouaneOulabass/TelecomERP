version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: telecomerp
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TlcmERP_db_2024!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  odoo:
    image: odoo:17.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./custom_addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - odoo_data:/var/lib/odoo
      - odoo_sessions:/var/lib/odoo/sessions
    environment:
      HOST: db
      USER: odoo
      PASSWORD: ${POSTGRES_PASSWORD:-TlcmERP_db_2024!}
    restart: always
    networks:
      - backend
      - frontend
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - odoo
    restart: always
    networks:
      - frontend

volumes:
  pgdata:
  odoo_data:
  odoo_sessions:

networks:
  backend:
  frontend:
