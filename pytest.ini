[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# TelecomERP — BDD Test Suite Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Runner   : pytest + pytest-bdd
# Requires : requirements-test.txt
# Run via  : bash bin/pre-deploy-tests.sh
#          : or directly: pytest custom_addons/ -v
# ─────────────────────────────────────────────────────────────────────────────

addopts =
    --tb=short
    -v
    --strict-markers
    --bdd-format=pretty

testpaths = custom_addons

python_files  = test_bdd_*.py
python_classes =
python_functions = test_*

# Feature file encoding
bdd_features_base_dir = tests/features

markers =
    bdd:          BDD scenario (auto-tagged by pytest-bdd)
    site:         Tests module telecom_site
    intervention: Tests module telecom_intervention
    paie:         Tests module telecom_hr_ma — paie marocaine
    habilitation: Tests module telecom_hr_ma — habilitations
    finance:      Tests module telecom_finance_ma
    ao:           Tests module telecom_ao
    contrat:      Tests module telecom_contract
    equipement:   Tests module telecom_equipment
    fleet:        Tests module telecom_fleet
    projet:       Tests module telecom_project
    reporting:    Tests module telecom_reporting
    base:         Tests module telecom_base
    localization: Tests module telecom_localization_ma
    smoke:        Tests rapides — sanity check avant push
    regression:   Tests de non-régression complets

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S
